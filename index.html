<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر ريفي - Rifishop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0b0e14;
            --card-bg: linear-gradient(145deg, #1e222d, #14171e);
            --accent-blue: #00d2ff;
            --accent-purple: #9d50bb;
            --text-gray: #b1b1b1;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            direction: rtl;
        }

        /* 1. الصور المتحركة (Slider) */
        .slider {
            width: 100%;
            height: 200px;
            overflow: hidden;
            position: relative;
        }
        .slides {
            display: flex;
            width: 300%; /* عدد الصور x 100 */
            height: 100%;
            animation: slideAnim 15s infinite; /* 5 ثواني لكل صورة */
        }
        .slides img { width: 100%; height: 100%; object-fit: cover; }
        
        @keyframes slideAnim {
            0% { transform: translateX(0); }
            33% { transform: translateX(100%); }
            66% { transform: translateX(200%); }
            100% { transform: translateX(0); }
        }

        /* 2. الكتابة المتحركة (Marquee) */
        .marquee {
            background: #161b22;
            padding: 10px 0;
            border-bottom: 1px solid #30363d;
            overflow: hidden;
            white-space: nowrap;
        }
        .marquee p {
            display: inline-block;
            animation: marqueeAnim 15s linear infinite;
            margin: 0;
            color: var(--text-gray);
            font-size: 14px;
        }
        @keyframes marqueeAnim {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* 3. الأزرار (Social Links) */
        .links-section { padding: 20px; }
        .link-item {
            background: var(--card-bg);
            border: 1px solid #2d333b;
            border-radius: 15px;
            padding: 15px 20px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .link-item i { font-size: 24px; }

        /* 4. قسم خدماتنا الحصرية */
        .services-container {
            margin: 20px;
            padding: 20px;
            border: 2px solid var(--accent-blue);
            border-radius: 25px;
            background: rgba(0, 210, 255, 0.05);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.1);
        }
        .services-header {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            color: var(--accent-blue);
            text-shadow: 0 0 10px var(--accent-blue);
        }
        .service-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px dashed #30363d;
        }
        .service-row i { color: var(--accent-blue); }

        /* النافذة المنبثقة (نفس الكود السابق) */
        .popup-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 10000;
        }
        .popup-content { background: #1c2128; padding: 25px; border-radius: 20px; text-align: center; width: 80%; border: 1px solid var(--accent-blue); }
    </style>
</head>
<body>

    <!-- 1. الصور المتحركة -->
    <div class="slider">
        <div class="slides">
            <img src="رابط_الصورة_1.jpg" alt="Slide 1">
            <img src="رابط_الصورة_2.jpg" alt="Slide 2">
            <img src="رابط_الصورة_3.jpg" alt="Slide 3">
        </div>
    </div>

    <!-- 2. الشريط المتحرك -->
    <div class="marquee">
        <p>| أهلاً بكم في متجر ريفي | أفضل الخدمات الرقمية بأقل الأسعار | سرعة وأمان وضمان |</p>
    </div>

    <!-- 3. الأزرار -->
    <div class="links-section">
        <a href="https://wa.me/رقمك" class="link-item">
            <span>WhatsApp</span>
            <i class="fab fa-whatsapp" style="color: #25d366;"></i>
        </a>
        <a href="#" class="link-item">
            <span>Facebook</span>
            <i class="fab fa-facebook" style="color: #1877f2;"></i>
        </a>
        <a href="https://whatsapp.com/channel/0029VbCifNwGOj9onMMOOR3X" class="link-item">
            <span>Channel WhatsApp</span>
            <i class="fas fa-bullhorn" style="color: #25d366;"></i>
        </a>
    </div>

    <!-- 4. خدماتنا الحصرية -->
    <div class="services-container">
        <div class="services-header">
            <i class="fas fa-gamepad"></i>
            <h2>خدماتنا الحصرية</h2>
            <i class="fas fa-crown"></i>
        </div>
        
        <div class="service-row">
            <span>بيع وشراء حسابات فري فاير 🔥</span>
            <i class="fas fa-exchange-alt"></i>
        </div>
        <div class="service-row">
            <span>شحن جواهر بأقل الأسعار 💎</span>
            <i class="fas fa-coins"></i>
        </div>
        <div class="service-row">
            <span>تأمين حسابات جيميل ⚙️</span>
            <i class="fas fa-shield-alt"></i>
        </div>
    </div>

    <!-- النافذة المنبثقة -->
    <div id="welcome-popup" class="popup-overlay">
        <div class="popup-content">
            <h3 style="color: var(--accent-blue);">أهلاً بك في متجر ريفي</h3>
            <p>انضم لقناتنا لتصلك أحدث العروض</p>
            <a href="https://whatsapp.com/channel/0029VbCifNwGOj9onMMOOR3X" style="background: #25d366; color: white; padding: 10px 20px; border-radius: 10px; text-decoration: none; display: inline-block; margin-top: 10px;">انضم الآن</a>
            <button onclick="closePopup()" style="display:block; margin: 15px auto; background:none; border:none; color:gray;">إغلاق</button>
        </div>
    </div>

    <script>
        window.onload = function() {
            setTimeout(() => { document.getElementById('welcome-popup').style.display = 'flex'; }, 2000);
        };
        function closePopup() { document.getElementById('welcome-popup').style.display = 'none'; }
    </script>
</body>
</html>
