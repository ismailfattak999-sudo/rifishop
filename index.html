<title>RIFI SHOP</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f1a;
  color: white;
}

/* HEADER */
.header {
  background: #4b4f8f;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header h2 {
  margin: 0;
  font-size: 18px;
}

/* BANNER */
.banner {
  margin: 15px;
  border-radius: 15px;
  overflow: hidden;
}

.banner img {
  width: 100%;
  border-radius: 15px;
}

/* INPUT */
.search {
  margin: 15px;
}

.search input {
  width: 100%;
  padding: 15px;
  border-radius: 25px;
  border: none;
  background: #1a1f2e;
  color: white;
  font-size: 16px;
}

/* BUTTONS */
.btn {
  margin: 10px 15px;
  padding: 18px;
  border-radius: 20px;
  background: linear-gradient(145deg, #1c2233, #0d111c);
  display: flex;
  justify-content: space-between;
  align-items: center;
  text-decoration: none;
  color: white;
  font-size: 18px;
  box-shadow: 0 0 10px #0ff3;
}

.btn img {
  width: 30px;
}

/* FOOTER */
.footer {
  text-align: center;
  margin: 20px;
  opacity: 0.7;
}
</style>

</head>
