<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر ريفي - Rifishop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0b0e14;
            --card-bg: linear-gradient(145deg, #1e222d, #14171e);
            --accent-blue: #00d2ff;
            --text-gray: #b1b1b1;
            --danger-red: #ff4b2b;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            direction: rtl;
            transition: background 0.3s, color 0.3s;
        }

        /* --- 1. السلايدر الاحترافي الجديد --- */
        .rifi-premium-slider {
            width: 92%;
            height: 210px;
            margin: 20px auto;
            overflow: hidden;
            border-radius: 25px;
            border: 2px solid rgba(0, 210, 255, 0.4);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), 0 0 20px rgba(0, 210, 255, 0.2);
            position: relative;
            background: #000;
            animation: glowPulse 3s infinite;
        }

        .slider-track {
            display: flex;
            width: 300%;
            height: 100%;
            animation: premiumSlide 12s infinite cubic-bezier(0.45, 0, 0.55, 1);
        }

        .slider-track img {
            width: 33.333%;
            height: 100%;
            object-fit: cover;
            filter: brightness(1.1);
        }

        @keyframes premiumSlide {
            0%, 25% { transform: translateX(0); }
            33%, 58% { transform: translateX(33.333%); }
            66%, 91% { transform: translateX(66.666%); }
            100% { transform: translateX(0); }
        }

        @keyframes glowPulse {
            0% { border-color: rgba(0, 210, 255, 0.4); box-shadow: 0 0 15px rgba(0, 210, 255, 0.1); }
            50% { border-color: rgba(0, 210, 255, 0.8); box-shadow: 0 0 25px rgba(0, 210, 255, 0.3); }
            100% { border-color: rgba(0, 210, 255, 0.4); box-shadow: 0 0 15px rgba(0, 210, 255, 0.1); }
        }

        /* --- 2. الأوضاع (ليلي / نهاري) --- */
        body.light-mode {
            background-color: #ffffff !important;
            color: #000000 !important;
        }
        body.light-mode .dropdown-container, 
        body.light-mode .services-container {
            background: #f0f2f5 !important;
            border-color: #ddd !important;
        }
        body.light-mode .link-header, body.light-mode .service-row, body.light-mode .marquee p {
            color: #333 !important;
        }

        .mode-toggle {
            position: fixed; bottom: 20px; left: 20px; z-index: 10001;
            background: var(--accent-blue); color: white; border: none;
            width: 50px; height: 50px; border-radius: 50%; cursor: pointer;
            box-shadow: 0 0 15px rgba(0,210,255,0.4); font-size: 20px;
            display: flex; align-items: center; justify-content: center;
        }

        /* --- 3. بقية التنسيقات --- */
        .marquee { background: #161b22; padding: 10px 0; border-bottom: 1px solid #30363d; overflow: hidden; white-space: nowrap; }
        .marquee p { display: inline-block; animation: marqueeAnim 15s linear infinite; margin: 0; color: var(--text-gray); }
        @keyframes marqueeAnim { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .links-section { padding: 15px; }
        .dropdown-container { background: var(--card-bg); border: 1px solid #2d333b; border-radius: 15px; margin-bottom: 12px; overflow: hidden; }
        .link-header { padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .dropdown-content { display: none; padding: 0 20px 20px; text-align: center; border-top: 1px solid #30363d; background: rgba(0,0,0,0.1); }
        
        .services-container { margin: 15px; padding: 20px; border: 2px solid var(--accent-blue); border-radius: 25px; background: rgba(0, 210, 255, 0.05); }
        .service-row { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px dashed #30363d; }
        
        .footer-credits { text-align: center; padding: 20px; font-size: 13px; color: var(--text-gray); }
        .footer-credits span { color: var(--accent-blue); font-weight: bold; }
    </style>
</head>
<body>

    <!-- الزر العائم لتبديل الألوان -->
    <button class="mode-toggle" onclick="toggleTheme()" id="themeBtn">
        <i class="fas fa-sun"></i>
    </button>

    <!-- السلايدر الاحترافي (0769 هي الأولى) -->
    <div class="rifi-premium-slider">
        <div class="slider-track">
            <img src="IMG_0769.jpeg" alt="Service 1">
            <img src="IMG_0768.jpeg" alt="Service 2">
            <img src="IMG_0770.jpeg" alt="Service 3">
        </div>
    </div>

    <div class="marquee">
        <p>| أهلاً بكم في متجر ريفي | شحن جواهر فري فاير | بيع حسابات مضمونة | أفضل الأسعار |</p>
    </div>

    <div class="links-section">
        <div class="dropdown-container">
            <div class="link-header" onclick="toggleD(this)">
                <span>WhatsApp</span>
                <i class="fab fa-whatsapp" style="color: #25d366; font-size: 24px;"></i>
            </div>
            <div class="dropdown-content">
                <a href="https://wa.me/212780938731" style="display: inline-block; background: #333; color: white; text-decoration: none; padding: 8px 30px; border-radius: 20px; font-weight: bold; margin-top:10px;">تواصل الآن</a>
            </div>
        </div>

        <div class="dropdown-container">
            <div class="link-header" onclick="toggleD(this)">
                <span>Instagram</span>
                <i class="fab fa-instagram" style="color: #e4405f; font-size: 24px;"></i>
            </div>
            <div class="dropdown-content">
                <a href="https://www.instagram.com/rifi.shop1" style="display: inline-block; background: #333; color: white; text-decoration: none; padding: 8px 30px; border-radius: 20px; font-weight: bold; margin-top:10px;">Follow Us</a>
            </div>
        </div>
    </div>

    <div class="services-container">
        <h3 style="text-align: center; color: var(--accent-blue);">خدماتنا الحصرية</h3>
        <div class="service-row"><span>شحن جواهر فري فاير 💎</span><i class="fas fa-coins"></i></div>
        <div class="service-row"><span>بيع وشراء حسابات 🔥</span><i class="fas fa-exchange-alt"></i></div>
        <div class="service-row"><span>وساطة مضمونة 🤝</span><i class="fas fa-handshake"></i></div>
    </div>

    <div class="footer-credits">
        جميع الحقوق محفوظة لـ <span>RIFI SHOP</span> &copy; 2026
    </div>

    <script>
        // وظيفة فتح القوائم
        function toggleD(e) {
            var c = e.nextElementSibling;
            c.style.display = (c.style.display === 'block') ? 'none' : 'block';
        }

        // وظيفة تبديل الوضع (أبيض/أسود)
        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('themeBtn');
            body.classList.toggle('light-mode');
            
            if (body.classList.contains('light-mode')) {
                btn.innerHTML = '<i class="fas fa-moon"></i>';
                btn.style.background = '#333';
            } else {
                btn.innerHTML = '<i class="fas fa-sun"></i>';
                btn.style.background = '#00d2ff';
            }
        }
    </script>
</body>
</html>
