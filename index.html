<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر ريفي - Rifishop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0b0e14;
            --card-bg: linear-gradient(145deg, #1e222d, #14171e);
            --accent-blue: #00d2ff;
            --text-gray: #b1b1b1;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            direction: rtl;
        }

        /* تنسيق البانر العلوي (صورة واحدة ثابتة لضمان العمل) */
        .header-banner {
            width: 100%;
            display: flex;
            justify-content: center;
            padding-top: 15px;
        }
        .header-banner img {
            width: 92%;
            max-width: 500px;
            height: auto;
            border-radius: 15px;
            border: 2px solid var(--accent-blue);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
        }

        /* الشريط المتحرك */
        .marquee {
            background: #161b22;
            padding: 10px 0;
            border-bottom: 1px solid #30363d;
            margin-top: 15px;
            overflow: hidden;
            white-space: nowrap;
        }
        .marquee p {
            display: inline-block;
            animation: marqueeAnim 15s linear infinite;
            margin: 0;
            color: var(--text-gray);
            font-size: 14px;
        }
        @keyframes marqueeAnim {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* الأزرار والقوائم */
        .links-section { padding: 15px; }
        .dropdown-container {
            background: var(--card-bg);
            border: 1px solid #2d333b;
            border-radius: 15px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .link-header {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
        }
        .dropdown-content {
            display: none;
            padding: 0 20px 20px;
            text-align: center;
            border-top: 1px solid #30363d;
            background: rgba(0,0,0,0.2);
        }

        /* قسم الخدمات */
        .services-container {
            margin: 15px;
            padding: 20px;
            border: 2px solid var(--accent-blue);
            border-radius: 25px;
            background: rgba(0, 210, 255, 0.05);
        }
        .services-header {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            color: var(--accent-blue);
        }
        .service-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px dashed #333;
        }

        .footer-credits { text-align: center; padding: 20px; font-size: 12px; color: var(--text-gray); }
    </style>
</head>
<body>

    <!-- تم استخدام رابط مباشر جديد للصورة الزرقاء -->
    <div class="header-banner">
        <img src="https://i.ibb.co/fN5mN5z/image-31.png" alt="RIFI SHOP">
    </div>

    <div class="marquee">
        <p>| أهلاً بكم في متجر ريفي | خدمات فري فاير | شحن جواهر | بيع حسابات | ثقة وأمان |</p>
    </div>

    <div class="links-section">
        <!-- WhatsApp -->
        <div class="dropdown-container">
            <div class="link-header" onclick="toggleD(this)">
                <span style="font-weight: bold;">WhatsApp</span>
                <i class="fab fa-whatsapp" style="color: #25d366; font-size: 24px;"></i>
            </div>
            <div class="dropdown-content">
                <p style="font-size: 13px; color: #b1b1b1; margin: 10px 0;">تواصل معنا لطلب شحن الجواهر أو الحسابات.</p>
                <a href="https://wa.me/212780938731" style="display: inline-block; background: #333; color: white; text-decoration: none; padding: 8px 25px; border-radius: 20px; font-weight: bold;">تواصل الآن</a>
            </div>
        </div>

        <!-- Channel -->
        <div class="dropdown-container">
            <div class="link-header" onclick="toggleD(this)">
                <span style="font-weight: bold;">قناة الواتساب</span>
                <i class="fas fa-bullhorn" style="color: #25d366; font-size: 22px;"></i>
            </div>
            <div class="dropdown-content">
                <a href="https://whatsapp.com/channel/0029VbCifNwGOj9onMMOOR3X" style="display: inline-block; background: #333; color: white; text-decoration: none; padding: 8px 25px; border-radius: 20px; font-weight: bold;">انضم للقناة</a>
            </div>
        </div>
    </div>

    <div class="services-container">
        <div class="services-header">
            <h3>خدماتنا الحصرية</h3>
            <i class="fas fa-crown"></i>
        </div>
        <div class="service-row"><span>شحن جواهر فري فاير 💎</span><i class="fas fa-coins"></i></div>
        <div class="service-row"><span>بيع وشراء حسابات 🔥</span><i class="fas fa-exchange-alt"></i></div>
        <div class="service-row"><span>وساطة مضمونة 🤝</span><i class="fas fa-handshake"></i></div>
    </div>

    <div class="footer-credits">
        جميع الحقوق محفوظة لمتجر <b>RIFI SHOP</b> &copy; 2026
    </div>

    <script>
        function toggleD(e) {
            var c = e.nextElementSibling;
            c.style.display = (c.style.display === 'block') ? 'none' : 'block';
        }
    </script>
</body>
</html>
